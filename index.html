<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#08295f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Violet Soccer" />
    <meta name="description" content="A cheerful, touch-friendly USA soccer game made for Violet." />
    <title>Violet's USA Soccer</title>

  <body>

        <p>Turn sideways to play</p>

    </main>
    <script type="module" src="/src/main.js"></script>
